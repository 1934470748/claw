<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MianClaw Key</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4f5;
        --surface: #ffffff;
        --surface-2: #fafafa;
        --text: #18181b;
        --muted: #71717a;
        --line: #e4e4e7;
        --primary: #18181b;
        --primary-text: #ffffff;
        --accent: #365314;
        --ok: #16a34a;
        --err: #dc2626;
        --shadow: 0 24px 70px rgba(24, 24, 27, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px;
      }

      .wrap {
        width: min(640px, 100%);
      }

      .brand {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
      }

      .brand img {
        width: 74px;
        height: 74px;
        border-radius: 22px;
        object-fit: cover;
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-align: center;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 12px;
        text-align: center;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      .lead {
        margin: 0 auto 24px;
        max-width: 520px;
        color: var(--muted);
        text-align: center;
        line-height: 1.7;
      }

      .card {
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 18px;
        padding: 22px;
        box-shadow: var(--shadow);
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface-2);
        margin-bottom: 18px;
      }

      button,
      input {
        width: 100%;
        border-radius: 12px;
        font: inherit;
      }

      button {
        border: 0;
        min-height: 46px;
        color: var(--primary-text);
        background: var(--primary);
        cursor: pointer;
        font-weight: 900;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.5;
        cursor: wait;
      }

      .tab {
        color: var(--muted);
        background: transparent;
      }

      .tab.active {
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 10px 24px rgba(24, 24, 27, 0.06);
      }

      .field {
        margin: 14px 0;
      }

      label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      input {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        outline: none;
        min-height: 48px;
        padding: 0 13px;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.08);
      }

      .primary {
        margin-top: 10px;
      }

      .secondary {
        margin-top: 10px;
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
      }

      .status {
        min-height: 22px;
        margin: 13px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .status.error { color: var(--err); }
      .status.ok { color: var(--ok); }

      .result {
        display: none;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      .keybox {
        overflow-wrap: anywhere;
        border: 1px solid color-mix(in srgb, var(--ok) 28%, var(--line));
        border-radius: 14px;
        background: color-mix(in srgb, var(--ok) 9%, var(--surface));
        color: #14532d;
        padding: 13px;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      .steps {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }

      .step {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        padding: 14px;
      }

      .step b {
        display: block;
        margin-bottom: 6px;
        color: var(--accent);
        font-size: 11px;
      }

      .step span {
        display: block;
        color: var(--text);
        font-size: 13px;
        font-weight: 900;
      }

      @media (max-width: 560px) {
        .steps { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="wrap">
        <div class="brand"><img src="./logo.png" alt="" /></div>
        <p class="eyebrow">MianClaw</p>
        <h1>生成 API Key</h1>
        <p class="lead">这里先保留注册和登录发 Key 的入口，后续只接你的 NewAPI 中转站。</p>

        <div class="card">
          <div class="tabs" role="tablist">
            <button class="tab active" id="registerTab" type="button">注册账号</button>
            <button class="tab" id="loginTab" type="button">登录账号</button>
          </div>

          <form id="keyForm">
            <div class="field">
              <label for="username">账号</label>
              <input id="username" autocomplete="username" placeholder="输入账号" required />
            </div>

            <div class="field">
              <label for="password">密码</label>
              <input id="password" type="password" autocomplete="current-password" placeholder="输入密码" required />
            </div>

            <div id="confirmField" class="field">
              <label for="confirmPassword">确认密码</label>
              <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="再输入一次密码" />
            </div>

            <button class="primary" id="submitBtn" type="submit">注册并生成 Key</button>
            <p class="status" id="status"></p>
          </form>

          <div class="result" id="result">
            <label>你的 API Key</label>
            <div class="keybox" id="keyValue"></div>
            <button class="secondary" id="copyBtn" type="button">复制 Key</button>
            <button class="primary" id="backBtn" type="button">复制并返回客户端</button>
          </div>
        </div>

        <div class="steps">
          <div class="step"><b>01</b><span>注册或登录</span></div>
          <div class="step"><b>02</b><span>生成 Key</span></div>
          <div class="step"><b>03</b><span>返回绑定</span></div>
        </div>
      </section>
    </main>

    <script>
      const clientUrl = "http://localhost:4173/app/dist/?v=10#/console";
      let mode = "register";
      let issuedKey = "";

      const registerTab = document.querySelector("#registerTab");
      const loginTab = document.querySelector("#loginTab");
      const confirmField = document.querySelector("#confirmField");
      const form = document.querySelector("#keyForm");
      const submitBtn = document.querySelector("#submitBtn");
      const statusEl = document.querySelector("#status");
      const resultEl = document.querySelector("#result");
      const keyValueEl = document.querySelector("#keyValue");
      const copyBtn = document.querySelector("#copyBtn");
      const backBtn = document.querySelector("#backBtn");

      function setMode(nextMode) {
        mode = nextMode;
        registerTab.classList.toggle("active", mode === "register");
        loginTab.classList.toggle("active", mode === "login");
        confirmField.style.display = mode === "register" ? "block" : "none";
        submitBtn.textContent = mode === "register" ? "注册并生成 Key" : "登录并生成 Key";
        statusEl.textContent = "";
        statusEl.className = "status";
      }

      function setStatus(message, type = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
      }

      async function copyKey() {
        if (!issuedKey) return;
        try {
          await navigator.clipboard.writeText(issuedKey);
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = issuedKey;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
        }
        setStatus("Key 已复制", "ok");
      }

      async function requestKey(event) {
        event.preventDefault();
        const username = document.querySelector("#username").value.trim();
        const password = document.querySelector("#password").value;
        const confirmPassword = document.querySelector("#confirmPassword").value;

        if (!username || !password) return setStatus("请填写账号和密码", "error");
        if (mode === "register" && password !== confirmPassword) return setStatus("两次输入的密码不一致", "error");

        submitBtn.disabled = true;
        setStatus(mode === "register" ? "正在注册并生成 Key..." : "正在登录并生成 Key...");

        try {
          const endpoint = mode === "register" ? "/api/clawhouse/register-and-issue-key" : "/api/clawhouse/login-and-issue-key";
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.success || !data.key) {
            throw new Error(data.error || data.message || "生成 Key 失败");
          }

          issuedKey = data.key;
          keyValueEl.textContent = issuedKey;
          resultEl.style.display = "block";
          setStatus("Key 已生成", "ok");
        } catch (error) {
          setStatus(error.message || "请稍后重试", "error");
        } finally {
          submitBtn.disabled = false;
        }
      }

      registerTab.addEventListener("click", () => setMode("register"));
      loginTab.addEventListener("click", () => setMode("login"));
      form.addEventListener("submit", requestKey);
      copyBtn.addEventListener("click", copyKey);
      backBtn.addEventListener("click", async () => {
        try { await copyKey(); } finally { window.location.assign(clientUrl); }
      });
      setMode("register");
    </script>
  </body>
</html>
